 <style>
  .sidebar .app-name-link img {
    width: 250px !important;

    font-size: 1.1rem !important;
    color: #444; 
  }

  @media screen and (max-width: 768px) {
    section.content {
      margin-left: 0 !important;
      width: 100% !important;
